build:
  maxIssues: 0
  weights:
    complexity: 2
    LongParameterList: 1
    style: 1
    comments: 1

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'

output-reports:
  active: true
  exclude:
    - 'TxtOutputReport'

comments:
  active: true
  AbsentOrWrongFileLicense:
    active: false
  CommentOverPrivateFunction:
    active: false
  CommentOverPrivateProperty:
    active: false
  EndOfSentenceFormat:
    active: false
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

complexity:
  active: true
  ComplexCondition:
    threshold: 4
  ComplexInterface:
    threshold: 10
  ComplexMethod:
    threshold: 15
  LargeClass:
    threshold: 300
  LongMethod:
    threshold: 30
  LongParameterList:
    threshold: 6
  MethodOverloading:
    threshold: 5
  NestedBlockDepth:
    threshold: 4
  StringLiteralDuplication:
    threshold: 3
    excludeStringsWithLessThan5Characters: true
    ignoreAnnotation: true
  TooManyFunctions:
    threshold: 15

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: false

empty-blocks:
  active: true

exceptions:
  active: true
  TooGenericExceptionCaught:
    exceptionNames:
      - ArrayIndexOutOfBoundsException
      - Error
      - Exception
      - IllegalMonitorStateException
      - NullPointerException
      - IndexOutOfBoundsException
      - RuntimeException
      - Throwable

naming:
  active: true
  ClassNaming:
    classPattern: '[A-Z][a-zA-Z0-9]*'
  EnumNaming:
    enumEntryPattern: '[A-Z][_a-zA-Z0-9]*'
  FunctionMaxLength:
    maximumFunctionNameLength: 30
  FunctionMinLength:
    minimumFunctionNameLength: 3
  FunctionNaming:
    functionPattern: '([a-z][a-zA-Z0-9]*)|(`.*`)'
    excludeClassPattern: '`.*`'
  MatchingDeclarationName:
    mustBeFirst: true
  MemberNameEqualsClassName:
    ignoreOverriddenFunction: true
  PackageNaming:
    packagePattern: '[a-z]+(\.[a-z][a-z0-9]*)*'
  TopLevelPropertyNaming:
    constantPattern: '[A-Z][_A-Z0-9]*'
    propertyPattern: '[a-z][a-zA-Z0-9]*'
    privatePropertyPattern: '(_)?[a-z][a-zA-Z0-9]*'

performance:
  active: true
  SpreadOperator:
    active: false

potential-bugs:
  active: true
  UnnecessarySafeCall:
    active: false
  UnusedUnaryOperator:
    active: false

style:
  active: true
  ForbiddenComment:
    values: ['TODO:', 'FIXME:', 'STOPSHIP:']
  MagicNumber:
    ignoreNumbers: ['-1', '0', '1', '2', '100', '1000']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: false
    ignoreLocalVariableDeclaration: false
    ignoreConstantDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
    ignoreEnums: true
    ignoreRanges: true
  MaxLineLength:
    maxLineLength: 120
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: false
  NewLineAtEndOfFile:
    active: false
  NoTabs:
    active: false
  TrailingComma:
    active: true
    exclude: ['**/test/**', '**/androidTest/**', '**/commonTest/**', '**/iosTest/**']
  WildcardImport:
    active: false

formatting:
  active: true
  android: false
  autoCorrect: true
  ChainWrapping:
    autoCorrect: false
  CommentSpacing:
    autoCorrect: false
  Filename:
    active: false
  FinalNewline:
    active: false
  ImportOrdering:
    autoCorrect: false
  Indentation:
    autoCorrect: false
  MaximumLineLength:
    active: false
  ModifierOrder:
    autoCorrect: false
  NoBlankLineBeforeRbrace:
    autoCorrect: false
  NoConsecutiveBlankLines:
    autoCorrect: false
  NoEmptyClassBody:
    autoCorrect: false
  NoLineBreakAfterElse:
    autoCorrect: false
  NoLineBreakBeforeAssignment:
    autoCorrect: false
  NoMultipleSpaces:
    autoCorrect: false
  NoSemicolons:
    autoCorrect: false
  NoTrailingSpaces:
    autoCorrect: false
  NoUnitReturn:
    autoCorrect: false
  NoUnusedImports:
    autoCorrect: false
  NoWildcardImports:
    autoCorrect: false
  PackageName:
    active: false
  SpacingAroundColon:
    autoCorrect: false
  SpacingAroundComma:
    autoCorrect: false
  SpacingAroundCurly:
    autoCorrect: false
  SpacingAroundKeyword:
    autoCorrect: false
  SpacingAroundOperators:
    autoCorrect: false
  SpacingAroundRangeOperator:
    autoCorrect: false
  StringTemplate:
    autoCorrect: false