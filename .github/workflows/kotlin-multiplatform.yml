name: Kotlin CI

on:
  push:
    branches: [ feature/*, fix/*, master ]
  pull_request:
    branches: [ feature/*, fix/*, master ]

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install LLVM Clang 17 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-17 clang-17 libclang-17-dev libclang-common-17-dev
          echo "LLVM_PATH=/usr/lib/llvm-17" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-17/lib:${{ env.LD_LIBRARY_PATH }}" >> $GITHUB_ENV
          # Disable libclang crash recovery to prevent JVM signal handler conflicts
          echo "LIBCLANG_DISABLE_CRASH_RECOVERY=1" >> $GITHUB_ENV
          # Export so child processes can see it
          export LD_LIBRARY_PATH=/usr/lib/llvm-17/lib:${{ env.LD_LIBRARY_PATH }}

      - name: Install LLVM Clang 17 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm@17
          echo "LLVM_PATH=$(brew --prefix llvm@17)" >> $GITHUB_ENV
          echo "${{ env.LLVM_PATH }}/bin" >> $GITHUB_PATH
          echo "DYLD_LIBRARY_PATH=${{ env.LLVM_PATH }}/lib:${{ env.DYLD_LIBRARY_PATH }}" >> $GITHUB_ENV
          # Disable libclang crash recovery to prevent JVM signal handler conflicts
          echo "LIBCLANG_DISABLE_CRASH_RECOVERY=1" >> $GITHUB_ENV
          # Export so child processes can see it
          export DYLD_LIBRARY_PATH=${{ env.LLVM_PATH }}/lib:${{ env.DYLD_LIBRARY_PATH }}

      - name: Install LLVM Clang (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm -y --allow-downgrade --force
          echo "LLVM_PATH=C:\Program Files\LLVM" >> $GITHUB_ENV
          echo "C:\Program Files\LLVM\lib" >> $GITHUB_PATH
          # Disable libclang crash recovery to prevent JVM signal handler conflicts
          echo "LIBCLANG_DISABLE_CRASH_RECOVERY=1" >> $GITHUB_ENV

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build with Gradle
        env:
          LIBCLANG_DISABLE_CRASH_RECOVERY: 1
        run: ./gradlew build --no-daemon

      - name: Run tests
        env:
          LIBCLANG_DISABLE_CRASH_RECOVERY: 1
        run: ./gradlew test --no-daemon

      - name: Collect crash diagnostics
        if: always()
        run: |
          # Collect all hs_err and core dump files from the entire workspace
          mkdir -p crash-diagnostics
          find . -name "hs_err_pid*.log" -exec cp {} crash-diagnostics/ \;
          find . -name "core.*" -exec cp {} crash-diagnostics/ \;
          find . -name "*.hprof" -exec cp {} crash-diagnostics/ \;
          ls -la crash-diagnostics/ || echo "No crash files found"

      - name: Upload test results and crash diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: '/home/runner/work/KoreOS/KoreOS/shared/clang-wrapper/hs_err_*.log'

  documentation:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Generate Dokka documentation
        run: ./gradlew dokkaGenerateHtml --no-daemon

      - name: Upload documentation
        uses: actions/upload-artifact@v7
        with:
          name: koreos-documentation
          path: '**/build/dokka/**'
