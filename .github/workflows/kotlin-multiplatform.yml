name: Kotlin CI

on:
  push:
    branches: [ feature/*, fix/*, master ]
  pull_request:
    branches: [ feature/*, fix/*, master ]

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'
          cache: 'gradle'

      - name: Install LLVM Clang 17 (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-17 clang-17 libclang-17-dev libclang-common-17-dev
          echo "LLVM_PATH=/usr/lib/llvm-17" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/llvm-17/lib:${{ env.LD_LIBRARY_PATH }}" >> $GITHUB_ENV
          # Export so child processes can see it
          export LD_LIBRARY_PATH=/usr/lib/llvm-17/lib:${{ env.LD_LIBRARY_PATH }}

      - name: Install LLVM Clang 17 (macOS)
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install llvm@17
          echo "LLVM_PATH=$(brew --prefix llvm@17)" >> $GITHUB_ENV
          echo "${{ env.LLVM_PATH }}/bin" >> $GITHUB_PATH
          echo "DYLD_LIBRARY_PATH=${{ env.LLVM_PATH }}/lib:${{ env.DYLD_LIBRARY_PATH }}" >> $GITHUB_ENV
          # Export so child processes can see it
          export DYLD_LIBRARY_PATH=${{ env.LLVM_PATH }}/lib:${{ env.DYLD_LIBRARY_PATH }}

      - name: Install LLVM Clang (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install llvm -y --allow-downgrade --force
          echo "LLVM_PATH=C:\Program Files\LLVM" >> $GITHUB_ENV
          echo "C:\Program Files\LLVM\lib" >> $GITHUB_PATH

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: |
            '**/build/test-results/**'
            '**/hs_err_pid*.log'
            '**/core.*'

  documentation:
    name: Generate Documentation
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Generate Dokka documentation
        run: ./gradlew dokkaGenerateHtml --no-daemon

      - name: Upload documentation
        uses: actions/upload-artifact@v7
        with:
          name: koreos-documentation
          path: '**/build/dokka/**'
